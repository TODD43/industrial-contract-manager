kind = "web"
previewPath = "/"
title = "Industrial Contract & Supplier Lifecycle Manager"
version = "1.0.0"
id = "artifacts/contract-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18997

[services.development]
run = "pnpm --filter @workspace/contract-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/contract-manager", "run", "build" ]
publicDir = "artifacts/contract-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18997"
BASE_PATH = "/"
